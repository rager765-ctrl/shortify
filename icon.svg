<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Background container (rounded squircle or circle for app icon) -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Premium Subtle Accent Rings -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(245, 158, 11, 0.15)" stroke-width="4" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(245, 158, 11, 0.05)" stroke-width="2" />

  <!-- Center Lucide Link SVG Icon -->
  <g transform="translate(128, 128) scale(10.666)">
    <!-- Scale to match 24x24 viewBox to 256x256 inside 512x512 -->
    <!-- 256 / 24 = 10.6666 -->
    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="url(#gold-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="url(#gold-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
